include-file = ~/.config/polybar/modules.ini
include-file = ~/.config/polybar/colors.ini

[global/wm]
monitor = HDMI-0
margin-bottom = 0
margin-top = 0

[bar/main]
modules-left = xworkspaces box xwindow
modules-right = seperator_end layout seperator pulseaudio seperator music seperator discord spotify obs seperator date seperator menu-shutdown seperator_end

locale = de_DE.UTF-8
monitor-strict = false
override-redirect = true
fixed-center = true
width = 100%
height = 38

dpi-x = 100
dpi-y = 100

background = ${colors.accent}
foreground = ${colors.text}

line-size = 4
line-color = ${colors.accent}

module-margin-left = 0
module-margin-right = 0

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = generic

font-0 = FiraCode Nerd Font Propo:style=Semibold:pixelsize=14:antialias=true
font-1 = FiraCode Nerd Font Propo:style=Bold:pixelsize=14:antialias=true
