[module/xworkspaces]
type = internal/xworkspaces

enable-click = true

format = <label-state>

label-active = %{T2}▪%{T-}%{T1}%name%%{T-}
label-active-padding = 1
label-active-background = ${colors.accent}
label-active-foreground = ${colors.foreground}

label-occupied = %{T2}▫%{T-}%{T1}%name%%{T-}
label-occupied-padding = 1
label-occupied-background = ${colors.black}

label-urgent = %name%
label-urgent-padding = 1
label-urgent-background = ${colors.error}

label-empty = %{T1}%name%%{T-}
label-empty-padding = 1
label-empty-background = ${colors.black}

[module/xwindow]
type = internal/xwindow

format = <label>
format-background = ${colors.accent}
format-foreground = ${colors.black}
format-padding = 1.2
format-spacing = 10

lable = %titel%
label-maxlen = 100
label-foreground = ${colors.black}
label-padding-right = 20

label-empty = ""
label-empty-background = ${colors.black}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = [ <ramp-volume> <label-volume> ]
format-volume-background = ${colors.black}

use-ui-max = true
interval = 1

label-muted = [  ]
label-muted-background = ${colors.black}
label-muted-foreground = ${colors.accent}
label-muted-padding = 1

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 

click-left = pulseaudio-control togmute
click-right = pavucontrol

[module/date]
type = internal/date
interval = 1

date = %a, %d.%b %H:%M

label = [ %date% ]
label-background = ${colors.black}
label-foreground = ${colors.text}
label-padding-right = 1

[module/tray]
type = internal/tray

format = [ <tray> ]
format-background = ${colors.black}

tray-size = 20
tray-padding = 5
tray-spacing = 10
tray-background = ${colors.black}

[module/cust_seperator]
type = custom/text
format = "  "
format-background = ${colors.black}

[module/cust_seperator_small]
type = custom/text
format = " "
format-background = ${colors.black}

[module/box]
type = custom/text
format = %{T3}[]= %{T-}
format-background = ${colors.black}

[module/music]
type = custom/script
exec = ~/.config/dotfiles/config/scripts/audio/scrolling.sh
format-prefix = "[  "
format = <label> ]
format-background = ${colors.black}
interval = 1
tail = true

[module/kb_layout]
type = custom/script
exec = setxkbmap -query | awk 'NR==3{print $2}'
format = [ <label> ]
format-background = ${colors.black}
interval = 1

[module/menu-shutdown]
type = custom/menu

expand-right = false

menu-0-0= 󰍃
menu-0-0-exec = systemctl suspend
menu-0-1 = 
menu-0-1-exec = systemctl reboot
menu-0-2 = 󰤆
menu-0-2-exec = systemctl poweroff

menu-padding = 1

label-open = 
label-open-background = ${colors.black}
label-close = 
label-close-foreground = ${colors.error}
label-close-background = ${colors.black}
label-separator = " "
label-separator-background = ${colors.black}

menu-0-0-padding-right = 1
menu-0-0-padding-left = 1
menu-0-0-foreground = ${colors.accent}
menu-0-0-background = ${colors.black}

menu-0-1-padding-right = 1
menu-0-1-padding-left = 1
menu-0-1-foreground = ${colors.accent}
menu-0-1-background = ${colors.black}

menu-0-2-padding-right = 1
menu-0-2-padding-left = 1
menu-0-2-foreground = ${colors.accent}
menu-0-2-background = ${colors.black}

[module/discord]
type = custom/script
exec = ~/.config/dotfiles/config/scripts/client/check_status.py --client=discord
interval = 2
label = %output%
label-padding-right = 1

format = <label>
format-foreground = ${colors.text}
format-background = ${colors.black}

click-left = ~/.config/dotfiles/config/scripts/client/focus.py --client=discord

[module/spotify]
type = custom/script
exec = ~/.config/dotfiles/config/scripts/client/check_status.py --client=spotify
interval = 2
label = %output%
format-foreground = ${colors.text}
format-background = ${colors.black}

click-left = ~/.config/dotfiles/config/scripts/client/focus.py --client=spotify

[module/obs]
type = custom/script
exec = ~/.config/dotfiles/config/scripts/client/check_status.py --client=obs
interval = 2
label = %output%
label-padding-left = 1

format = <label>
format-foreground = ${colors.text}
format-background = ${colors.black}

click-left = ~/.config/dotfiles/config/scripts/client/focus.py --client=obs

[module/tray_label_left]
type = custom/text
label = "["
label-padding-right = 1
label-foreground = ${colors.text}
label-background = ${colors.black}

[module/tray_label_right]
type = custom/text
label = "]"
label-padding-left = 1
label-foreground = ${colors.text}
label-background = ${colors.black}
