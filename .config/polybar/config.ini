[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/top]
width = 100%
height = 30pt
radius = 0
tray-padding = 5pt
offset-x = 1%
offset-y = 0.5%
fixed-center = true
line-size = 5pt

dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}


padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

modules-left = rofi xworkspaces xwindow
modules-right = systray pulseaudio cpu date2 date poweroff

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = i3

font-0 = JetBrainsMono Nerd Font:style=Bold:pixelsize=13;3

# override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[module/date2]
type = internal/date
interval = 1

date = %A, %d.%m

label = %date%
label-foreground = ${colors.primary}

[module/rofi]
type = custom/text 
content =" ÔĆÉ "
content-padding = 1
click-left = exec rofi -show run
content-foreground =  ${colors.primary}

[module/poweroff]
type = custom/text 
content =" ÔÄĎ "
content-padding = 1
click-left = exec systemctl poweroff
content-foreground =  ${colors.primary}


[settings]
screenchange-reload = true
