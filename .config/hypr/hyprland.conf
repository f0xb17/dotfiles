### config ###
$terminal = alacritty
$fileManager = nautilus
$menu = wofi --show drun
$editor = code
$mod = SUPER

### Monitors ###
monitor=HDMI-A-1,preferred,auto,auto

### Autostart ###
exec-once = waybar & nwg-dock-hyprland -r && swaync & hyprpaper
exec-once = xwaylandvideobridge
exec-once = discord
exec-once = ~/.config/hypr/scripts/blueman.sh

### env ##
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

cursor {
    no_hardware_cursors = true
}

xwayland {
    force_zero_scaling = true
}

### Look & Feel / Styling ###
general {
  gaps_in = 10
  gaps_out = 15
  
  col.active_border = rgb(cba6f7)
  col.inactive_border = rgba(bac2deaa)

  resize_on_border = true
  allow_tearing = false

   layout = dwindle
}

decoration {
  rounding = 0

  active_opacity = 1.0
  inactive_opacity = 1.0

  shadow {
    enabled = true
    range = 20
    render_power = 3
    color =  rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 3
    passes = 1
    vibrancy = 0.1696
    xray = true
    new_optimizations = true
  }
}

animations {
  enabled = true

  bezier = easeOutQuint, 0.23, 1, 0.32, 1

  animation = workspaces, 1, 2.5, default
  animation = windows, 1, 2.0, easeOutQuint
  animation = windowsOut, 1, 3.0, easeOutQuint
}

dwindle {
  pseudotile = true 
  preserve_split = true
}

master {
  new_status = master
}

misc {
  force_default_wallpaper = 0
}

### Window and Layer Rules ###
windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

layerrule = blur,waybar
layerrule = blur,wofi
layerrule = blur,nwg-dock-hyprland

### Keyboard ###
input {
  kb_layout = de, us
  kb_options=grp:alt_shift_toggle
  follow_mouse = 1
  sensitivity = 0

  touchpad {
    natural_scroll = false
  }
}

gestures {
  workspace_swipe = false
}

device {
  name = epic-mouse-v1
  sensitivity = -0.5
}

### Keybindings ###
bind = $mod, SPACE, exec, $menu
bind = $mod, c, exec, $editor
bind = $mod, E, exec, $fileManager
bind = $mod, Escape, killactive
bind = $mod, RETURN, exit,

bind = $mod SHIFT, S, exec, hyprshot -m window
bind = $mod, S, exec, hyprshot -m region
bind = $mod ALT, S, exec, hyprshot -m overview
bind = $mod, D, exec, nwg-dock-hyprland

bind = $mod, Y, movefocus, l
bind = $mod, X, movefocus, r
bind = $mod, P, pseudo
bind = $mod, J, togglesplit

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1
